server {
    listen 8080;
    server_name _;

    root /var/www/openclaw-trading-bot;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /trader {
        return 301 /trader/;
    }

    location /trader/ {
        alias /var/www/openclaw-trading-bot/;
        try_files $uri $uri/ /trader/index.html;
    }

    location ~* \.(json)$ {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location ~* \.(html|css|js)$ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
